name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fixtrack/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fixtrack

      - name: Build
        run: npm run build
        working-directory: fixtrack

      - name: Copy 404.html for SPA routing
        run: cp fixtrack/dist/index.html fixtrack/dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fixtrack/dist
